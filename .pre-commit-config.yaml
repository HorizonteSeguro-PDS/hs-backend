repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        types_or: [python, pyi]

      - id: ruff-format-check
        name: ruff format check
        entry: uv run ruff format .
        language: system
        pass_filenames: false
        types_or: [python, pyi]
